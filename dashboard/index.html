<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Perfil da Equipe — ZenFisio</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F2F4F0; --surface: #FFFFFF; --border: #DDE0D8;
      --text: #1C201A; --text-muted: #5E6659; --text-hint: #9AA394;
      --accent: #4A7C59; --accent-light: #EAF2EC; --accent-text: #2D5438;
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header { background: var(--accent); color: #fff; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
    .header-back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 13px; transition: color .2s; }
    .header-back:hover { color: #fff; }
    .header-title { font-family: 'Lora', serif; font-size: 20px; font-weight: 600; }
    .header-sub { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.6); }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 20px 48px; }

    /* CARDS DE RESUMO */
    .resumo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .resumo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .resumo-num { font-family: 'Lora', serif; font-size: 36px; font-weight: 600; color: var(--accent); line-height: 1; margin-bottom: 6px; }
    .resumo-label { font-size: 12px; color: var(--text-hint); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; }

    /* GRID DE GRÁFICOS */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 700px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    .chart-title { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 20px; text-align: center; }
    .chart-wrap { position: relative; height: 220px; }

    /* TABELA ANIVERSÁRIOS */
    .aniv-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .aniv-header { padding: 18px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .aniv-header h2 { font-family: 'Lora', serif; font-size: 15px; font-weight: 600; }
    .aniv-table { width: 100%; border-collapse: collapse; }
    .aniv-table th { padding: 10px 24px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-hint); text-align: left; background: var(--bg); border-bottom: 1px solid var(--border); }
    .aniv-table td { padding: 12px 24px; font-size: 14px; color: var(--text); border-bottom: 1px solid var(--border); }
    .aniv-table tr:last-child td { border-bottom: none; }
    .aniv-table tr:hover td { background: var(--accent-light); }
    .tempo-badge { display: inline-block; background: var(--accent-light); color: var(--accent-text); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }

    .loading { text-align: center; padding: 60px 20px; color: var(--text-hint); font-size: 14px; }
    .section-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 16px; }
  </style>
</head>
<body>

<header>
  <a class="header-back" href="../">← Portal RH</a>
  <span class="header-title">Perfil da Equipe</span>
  <span class="header-sub" id="header-sub">Carregando...</span>
</header>

<div class="container">
  <div id="loading" class="loading">Carregando dados...</div>
  <div id="conteudo" style="display:none;">

    <!-- Resumo -->
    <div class="resumo-grid" id="resumo-grid"></div>

    <!-- Gráficos -->
    <p class="section-title">Distribuição da Equipe</p>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Faixa Etária</div>
        <div class="chart-wrap"><canvas id="chart-faixa"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Tempo de Empresa</div>
        <div class="chart-wrap"><canvas id="chart-tempo"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Gênero</div>
        <div class="chart-wrap"><canvas id="chart-genero"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Modelo de Contratação</div>
        <div class="chart-wrap"><canvas id="chart-contrato"></canvas></div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:28px;">
      <div class="chart-title">Colaboradores por Setor</div>
      <div class="chart-wrap" style="height:180px;"><canvas id="chart-setor"></canvas></div>
    </div>

    <!-- Aniversários -->
    <p class="section-title">🎉 Próximos Aniversários de Empresa</p>
    <div class="aniv-card">
      <table class="aniv-table">
        <thead>
          <tr>
            <th>Colaborador</th>
            <th>Data de Início</th>
            <th>Tempo de Empresa</th>
          </tr>
        </thead>
        <tbody id="aniv-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzblEIQor7UuPFzO6Ga2UREXjYYkeiCNXtsom4XjCFSUbb9hI7S-djhgi6WioNGSJ2k/exec';

  const CORES = ['#4A7C59','#6aab7e','#8dc4a0','#b2d9c2','#d5ece0','#2d5438','#1a3d28','#9fc5b0','#5c9474','#3d7a5a'];
  const CORES_PIZZA = ['#4A7C59','#6aab7e','#9fc5b0','#d5ece0','#2d5438','#b2d9c2'];

  async function carregar() {
    try {
      const r = await fetch(`${SCRIPT_URL}?acao=publico`);
      const d = await r.json();
      if (!d.ok) throw new Error(d.erro);
      renderizar(d);
    } catch(e) {
      document.getElementById('loading').textContent = 'Erro ao carregar dados. Tente novamente.';
    }
  }

  function renderizar(d) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('conteudo').style.display = 'block';

    const total = d.genero.reduce((s, i) => s + i.valor, 0);
    document.getElementById('header-sub').textContent = total + ' colaboradores';

    // Resumo
    document.getElementById('resumo-grid').innerHTML = `
      <div class="resumo-card"><div class="resumo-num">${total}</div><div class="resumo-label">Colaboradores</div></div>
      <div class="resumo-card"><div class="resumo-num">${d.mediaIdade}</div><div class="resumo-label">Média de Idade</div></div>
      <div class="resumo-card"><div class="resumo-num">${d.setor.length}</div><div class="resumo-label">Setores</div></div>
      <div class="resumo-card"><div class="resumo-num">${d.modeloContratacao.find(m => m.label === 'CLT')?.valor || 0}</div><div class="resumo-label">CLT</div></div>
    `;

    // Gráficos de pizza
    criarPizza('chart-faixa', d.faixaEtaria);
    criarPizza('chart-tempo', d.tempoEmpresa);
    criarPizza('chart-genero', d.genero);
    criarPizza('chart-contrato', d.modeloContratacao);

    // Gráfico de barras — Setor
    new Chart(document.getElementById('chart-setor'), {
      type: 'bar',
      data: {
        labels: d.setor.map(s => s.label),
        datasets: [{ data: d.setor.map(s => s.valor), backgroundColor: CORES, borderRadius: 6, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: 'DM Sans', size: 12 } } },
          y: { grid: { color: '#f0f0ec' }, ticks: { stepSize: 1, font: { family: 'DM Sans', size: 11 } } }
        }
      }
    });

    // Aniversários
    const tbody = document.getElementById('aniv-tbody');
    tbody.innerHTML = d.aniversarios.map(a => `
      <tr>
        <td>${a.nome}</td>
        <td>${a.inicio}</td>
        <td><span class="tempo-badge">${a.tempo}</span></td>
      </tr>
    `).join('');
  }

  function criarPizza(id, dados) {
    new Chart(document.getElementById(id), {
      type: 'doughnut',
      data: {
        labels: dados.map(d => d.label),
        datasets: [{ data: dados.map(d => d.valor), backgroundColor: CORES_PIZZA, borderWidth: 2, borderColor: '#fff' }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { family: 'DM Sans', size: 11 }, padding: 12, boxWidth: 12, boxHeight: 12 }
          }
        }
      }
    });
  }

  carregar();
</script>
</body>
</html>
